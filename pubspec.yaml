name: permis_connect
description: PermisConnect - Auto-École Digitale pour l'Afrique francophone
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.2.0

  # Supabase
  supabase_flutter: ^2.3.4

  # Local Storage
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0

  # HTTP & Network
  http: 1.5.0
  connectivity_plus: ^6.0.2
  dio: ^5.4.0

  # UI Components
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.67.0
  table_calendar: ^3.0.9
  percent_indicator: ^4.2.3
  lottie: ^3.1.0
  flutter_staggered_animations: ^1.1.1
  smooth_page_indicator: ^1.1.0
  fluttertoast: ^8.2.4
  badges: ^3.1.2
  intl: ^0.19.0
  timeago: ^3.6.1

  # Notifications
  flutter_local_notifications: ^17.1.1

  # Images & Icons
  image_picker: ^1.0.7
  flutter_launcher_icons: ^0.13.1
  cupertino_icons: ^1.0.2

  # Utilities
  uuid: ^4.3.3
  crypto: ^3.0.3
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  url_launcher: ^6.2.5
  share_plus: ^9.0.0
  package_info_plus: ^8.0.0
  device_info_plus: ^10.1.0

  # PDF & Documents
  pdf: ^3.10.8
  printing: ^5.12.0
  file_picker: ^8.0.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/data/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
