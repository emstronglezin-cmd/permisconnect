name: permis_connect
description: PermisConnect - Auto-École Digitale pour l'Afrique francophone
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9

  # Navigation
  go_router: ^13.2.0

  # Supabase
  supabase_flutter: ^2.3.4

  # Local Storage
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0

  # HTTP & Network
  http: 1.5.0
  connectivity_plus: ^6.0.2

  # UI Components
  fl_chart: ^0.67.0
  table_calendar: ^3.0.9
  percent_indicator: ^4.2.3
  shimmer: ^3.0.0
  intl: ^0.19.0

  # Images & Icons
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  cupertino_icons: ^1.0.2

  # Utilities
  uuid: ^4.3.3
  path_provider: ^2.1.2
  url_launcher: ^6.2.5
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/data/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
